services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: app-rep-comment-backend:latest
    container_name: arc-backend
    restart: unless-stopped
    environment:
      ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-8}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME must be set in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?APP_ENCRYPTION_KEY must be set in .env}
      DATABASE_URL: sqlite:////app/data/database.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    volumes:
      # Persist SQLite DB + WAL files across container rebuilds.
      # Bind mount keeps the DB readable on the host for backups/restore
      # without needing root access to /var/lib/docker/volumes.
      - ./data:/app/data
    expose:
      - "8000"
    # Uncomment to expose the API directly on the host (bypassing nginx):
    # ports:
    #   - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: app-rep-comment-frontend:latest
    container_name: arc-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
